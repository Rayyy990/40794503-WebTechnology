<!DOCTYPE html>

<head>

</head>
<body>

<!-- Ambient canvas background -->
<canvas id="bgCanvas"></canvas>

<main class="page-center">

    <!-- Actions -->
    <a class="panel-btn primary" href="game.html">Play Again</a>
