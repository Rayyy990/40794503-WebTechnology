<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reality Distortion — Menu</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/menu.css">
</head>
<body>

<!-- Ambient canvas background (driven by menu.js in Phase 2) -->
<canvas id="bgCanvas"></canvas>

<!-- Main Menu -->
<main class="menu-page">

  <!-- Logo -->
  <div class="menu-logo">
    <h1>CHAOS<br>ARENA</h1>
    <p class="subtitle">Survive the collapse</p>
  </div>

  <!-- Difficulty Buttons -->
  <nav class="menu-grid">

    <a class="diff-btn btn-easy" href="game.html?difficulty=easy">
        <span class="btn-label">
          <span>Easy</span>
          <span class="btn-pip"></span>
        </span>
    </a>

    <a class="diff-btn btn-normal" href="game.html?difficulty=normal">
        <span class="btn-label">
          <span>Normal</span>
          <span class="btn-pip"></span>
        </span>
    </a>

    <a class="diff-btn btn-insane" href="game.html?difficulty=insane">
        <span class="btn-label">
          <span>Insane</span>
          <span class="btn-pip"></span>
        </span>
    </a>

    <div class="divider"></div>

    <a class="diff-btn btn-settings" href="settings.html">
        <span class="btn-label">
          <span>Settings</span>
          <span class="btn-pip"></span>
        </span>
    </a>

  </nav>
</main>

<div class="menu-version">v2.0 — Phase 2</div>

<!-- JS loaded in Phase 2 -->
<script src="js/menu.js"></script>

</body>
</html>
